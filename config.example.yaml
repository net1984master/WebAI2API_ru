# Уровень логов: debug | info | warn | error
logLevel: info

server:
  # Порт прослушивания
  port: 3000
  # API Token для аутентификации, минимум 10 символов (можно сгенерировать с помощью npm run genkey)
  # Данная конфигурация применяется к API интерфейсу и WebUI
  auth: sk-myapi123
  # Настройки heartbeat для потоковых запросов (автоматическая отправка heartbeat для запросов stream: true для предотвращения таймаута)
  keepalive:
    # Режим heartbeat
    # "comment": (рекомендуется) отправка комментария :keepalive, не загрязняет данные
    # "content": (резервный) отправка пустого delta, используется только когда клиент должен получить JSON пакет для сброса таймаута
    mode: "comment"

backend:
  # ========================================
  # Конфигурация Pool
  # ========================================
  pool:
    # Глобальная стратегия планирования:
    # - least_busy (рекомендуется): приоритетное распределение Worker с наименьшим количеством текущих задач
    # - round_robin: циклическое распределение (A -> B -> C -> A)
    # - random: случайное распределение
    # При распределении задач все Workers всех Instances рассматриваются плоско
    strategy: least_busy

    # ========================================
    # Конфигурация отказоустойчивости
    # ========================================
    # При возврате сетевой ошибки адаптером, автоматически пытаться использовать другой Worker, поддерживающий ту же модель
    failover:
      enabled: true           # Включить故障转移
      maxRetries: 2           # Максимальное количество повторных попыток (0=без ограничений)
      imgDlRetry: false       # Повторные попытки загрузки изображений, предоставляет отдельную возможность повтора для результатов генерации изображений
      imgDlRetryMaxRetries: 2 # Максимальное количество повторов загрузки изображений

    # ========================================
    # Время ожидания генерации
    # ========================================
    # Максимальное время ожидания возврата результатов генерации в миллисекундах
    waitTimeout: 120000

    # ========================================
    # Список экземпляров браузера
    # ========================================
    # Каждый Instance представляет отдельный процесс браузера (Context + UserData + Proxy)
    # Режим входа в систему:
    #   npm start -- -login              запуск первого Worker для авторизации
    #   npm start -- -login=workerName   запуск Worker с указанным именем для авторизации
    # Внимание: имя Worker должно быть уникальным глобально
    # ========================================
    instances:
      # ------------------------------------------------
      # [Экземпляр 1] Экземпляр браузера по умолчанию
      # ------------------------------------------------
      - name: "browser_default"        # ID экземпляра (для отображения в логах и получения Cookie)
        # При отсутствии userDataMark данные хранятся в data/camoufoxUserData
        # Все Workers в одном экземпляре совместно используют данные браузера и статус авторизации
        # При использовании единого входа через Google OAuth и т.п., достаточно выполнить вход один раз для всех Workers

        # Возможности данного экземпляра браузера (список адаптеров)
        # Эквивалент открытия разных вкладок в этом браузере
        workers:
          - name: "default"            # Уникальный идентификатор (для режима входа и отображения в логах)
            # Список типов адаптеров:
            #   lmarena                (Генерация изображений LMArena)
            #   lmarena_text           (Генерация текста LMArena)
            #   gemini_biz             (Генерация изображений и видео Gemini Business)
            #   gemini_biz_text        (Генерация текста Gemini Business)
            #   gemini                 (Генерация изображений и видео Google Gemini)
            #   gemini_text            (Генерация текста Google Gemini)
            #   zai_is                 (Генерация изображений zAI)
            #   zai_is_text            (Генерация текста zAI)
            #   nanobananafree_ai      (Генерация изображений NanoBananaFree)
            #   zenmux_ai_text         (Генерация текста ZenMux)
            #   chatgpt                (Генерация изображений ChatGPT)
            #   chatgpt_text           (Генерация текста ChatGPT)
            #   sora                   (Генерация видео Sora)
            #   deepseek_text          (Генерация текста DeepSeek)
            #   doubao                 (Генерация изображений Doubao)
            #   doubao_text            (Генерация текста Doubao)
            #   test                   (Обнаружение браузера, только для отладки)
            type: lmarena              # Тип адаптера

      # ------------------------------------------------
      # Ниже приведены примеры конфигурации множественных экземпляров (по умолчанию закомментированы)
      # ------------------------------------------------

      # [Экземпляр 2] Отдельная директория данных + выделенный прокси
      # - name: "browser_us_01"
      #   userDataMark: "us_01"        # Директория данных: data/camoufoxUserData_us_01
      #
      #   # Прокси на уровне экземпляра (все Workers данного экземпляра используют этот прокси совместно)
      #   proxy:
      #     enable: true
      #     type: socks5
      #     host: 192.168.1.10
      #     port: 1080
      #     user: myuser               # Опциональная аутентификация
      #     passwd: mypassword
      #
      #   workers:
      #     - name: "us_lmarena"
      #       type: lmarena
      #
      #     - name: "us_zai"
      #       type: zai_is
      #
      #     # Агрегированный тип Worker (несколько бэкендов в одной вкладке)
      #     - name: "us_merged"
      #       type: merge
      #       mergeTypes: [gemini_biz, nanobananafree_ai]
      #       mergeMonitor: gemini_biz  # Бэкенд для мониторинга в режиме ожидания (опционально, пусто = неактивно)

      # [Экземпляр 3] Принудительное прямое подключение (без прокси)
      # - name: "browser_direct"
      #   userDataMark: "direct"
      #   proxy:
      #     enable: false              # Не использовать даже при наличии глобального прокси
      #
      #   workers:
      #     - name: "direct_gemini"
      #       type: gemini_biz

  # ========================================
  # Конфигурация адаптеров (заполняется по необходимости)
  # ========================================
  adapter:
    # Настройки Gemini Business
    gemini_biz:
      # URL входа
      # Пример: "https://business.gemini.google/home/cid/8888a888-b6e0-88be-86e1-888cf3ee8cf4"
      entryUrl: ""
    # Конфигурация Lmarena
    lmarena:
      # При включении возвращает напрямую URL изображения (но другие адаптеры, не поддерживающие эту опцию, всё равно возвращают Base64)
      returnUrl: false
      # Черно-белый список моделей для данного адаптера (каждый адаптер может использовать эту функцию, родительский ключ - ID адаптера, рекомендуется изменять через WebUI)
      # modelFilter:
      #  mode: whitelist                        # Белый списокwhitelist Черный списокblacklist
      #  list:                                  # Список только разрешенных или только запрещенных моделей
      #    - gemini-3-pro-image-preview
      #    - gemini-3-pro-image-preview-2k
      #    - gemini-2.5-flash-image-preview


queue:
  # Размер буфера очереди (дополнительные номера в очереди для не-потоковых запросов)
  # Фактический лимит очереди = Количество Workers + queueBuffer
  # При значении 0 ограничение количества не-потоковых запросов отсутствует
  queueBuffer: 2
  # Максимальное количество изображений
  # Максимум на веб-странице 10 вложений, изображения свыше 10 будут отброшены
  imageLimit: 5

browser:
  # Путь к исполняемому файлу браузера (пусто = использовать по умолчанию)
  # Не рекомендуется изменять без необходимости, иначе придется решать много дополнительных зависимостей
  # Пример для Windows: "C:\\camoufox\\camoufox.exe"
  # Пример для Linux: "/opt/camoufox/camoufox"
  path: ""

  # Включить безголовый режим
  headless: false

  # Режим имитации траектории мыши
  # - false:  отключить имитацию, использовать нативные клики Playwright (лучшая производительность, но обнаруживается автоматизацией)
  # - true:   использовать оптимизированный ghost-cursor проекта (более естественный, например, клики не точно в центр, но чуть хуже производительность)
  # - "camou": использовать встроенную траекторию Camoufox (баланс производительности и естественности)
  humanizeCursor: true

  # Изоляция сайтов (fission.autostart)
  # Включено - сохраняет стандартное поведение Firefox
  # Выключено - значительно снижает потребление памяти, предотвращает сбои на слабых серверах
  # ⚠️ Предупреждение о риске: Обычные пользователи Firefox по умолчанию используют Fission. Хотя его отключение не раскрывает обычные отпечатки,
  # очень продвинутые анти-бот системы могут идентифицировать автоматизацию через обнаружение "однопроцессной модели" или "задержек межпроцессного взаимодействия"!
  fission: true

  # Внедрение CSS оптимизации производительности
  # Снижает нагрузку на CPU в безграфических средах путем отключения эффектов веб-страниц
  cssInject:
    # Отключить анимации веб-страниц
    # Эффект: удаление transition и animation
    # Выгода: значительное снижение постоянной нагрузки на CPU
    # Риск: низкий. Почти не влияет на отпечаток браузера, но может вызвать аномалии раскладки на некоторых страницах
    animation: false

    # Отключить фильтры и тени
    # Эффект: удаление blur, box-shadow и других сложных эффектов рендеринга
    # Выгода: в безграфических средах предотвращает 100% загрузку CPU и зависания
    # Риск: средний. Интерфейс станет некрасивым,少数反爬可能会检测样式计算结果
    # Некоторые (немногие) анти-бот системы могут обнаруживать результаты вычисления стилей
    filter: false

    # Снижение качества рендеринга шрифтов
    # Эффект: отключение сглаживания шрифтов, принудительный режим быстрого рендеринга
    # Выгода: незначительное снижение нагрузки CPU на рисование
    # ⚠️ Риск: высокий. Появится ступенчатость на краях текста, и отпечаток шрифта может не соответствовать стандартному браузеру (легко распознается продвинутыми анти-ботами)
    font: false

  # [Глобальный прокси] Если Instance не имеет независимой конфигурации прокси, будет использована эта конфигурация
  proxy:
    # Включить прокси
    enable: false
    # Тип прокси: http или socks5
    type: http
    # Хост прокси
    host: 127.0.0.1
    # Порт прокси
    port: 7890
    # Аутентификация прокси (опционально)
    # user: username
    # passwd: password